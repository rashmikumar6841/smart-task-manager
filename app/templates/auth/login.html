{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-secondary bg-dark">
            <div class="card-header bg-black text-center py-3 border-secondary">
                <h3 class="mb-0 fw-bold">Welcome Back</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="username" name="username" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control bg-dark text-light border-secondary" id="password" name="password" required>
                        </div>
                    </div>
                    
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input border-secondary" id="remember" name="remember">
                        <label class="form-check-label text-muted" for="remember">Remember me</label>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Log In</button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-black border-secondary text-center py-3">
                <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
